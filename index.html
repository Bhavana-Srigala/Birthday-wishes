<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday 🎉</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: fadeIn 2s;
            max-width: 400px;
        }

        h1 {
            color: #ff4081;
            font-size: 36px;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            font-size: 22px;
        }

        p {
            font-size: 18px;
            color: #555;
            margin-top: 15px;
        }

        .cake {
            font-size: 70px;
            margin: 20px 0;
        }

        .footer {
            margin-top: 20px;
            font-size: 16px;
            color: #777;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Happy Birthday 🎉</h1>
        <h2>Dear Special One 💖</h2>

        <div class="cake">🎂</div>

        <p>
            May your day be filled with smiles, laughter,  
            and everything your heart wishes for.  
            You are amazing and truly special!
        </p>

        <p>
            Keep shining ✨  
            Keep dreaming 🌈  
            Keep smiling 😊
        </p>

        <div class="footer">
            Made with ❤️ using HTML
        </div>
    </div>

</body>
</html>
